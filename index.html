<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASHFLOW AI 💰</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>CASHFLOW AI 💰</h1>
        <p class="tagline">Built by CEO Kingsley</p>
        
        <div class="balance-box">
            <h2>Your Balance</h2>
            <p id="balance">₦0</p>
        </div>

        <h2>🔥 Complete Tasks & Earn</h2>
        
        <div class="task" id="task1">
            <div class="task-info">
                <h3>🎵 Stream Music</h3>
                <p>Play CEO Kingsley song for 5s</p>
            </div>
            <button onclick="completeTask('task1', 50, 'https://audiomack.com/ceokingsley/song/you-matter')">+₦50</button>
        </div>

        <div class="task" id="task2">
            <div class="task-info">
                <h3>🎧 Audiomack Stream</h3>
                <p>Stream on Audiomack 5s</p>
            </div>
            <button onclick="completeTask('task2', 50, 'https://audiomack.com/ceokingsley')">+₦50</button>
        </div>

        <div class="task" id="task3">
            <div class="task-info">
                <h3>👍 Follow on Facebook</h3>
                <p>7-Day Rule: Stay followed to earn</p>
            </div>
            <button onclick="completeTask('task3', 100, 'https://facebook.com')">+₦100</button>
        </div>

        <div class="task" id="task4">
            <div class="task-info">
                <h3>🔥 Follow on TikTok</h3>
                <p>7-Day Rule: Stay followed to earn</p>
            </div>
            <button onclick="completeTask('task4', 100, 'https://tiktok.com')">+₦100</button>
        </div>

        <button class="withdraw-btn" onclick="withdraw()">Withdraw Earnings</button>
    </div>

    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="app.js"></script>
</body>
</html>
